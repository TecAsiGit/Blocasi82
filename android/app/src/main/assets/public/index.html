<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Blocasi82</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='12' y='4' width='40' height='56' rx='4' fill='%23f5f5dc' stroke='%23999' stroke-width='2'/%3E%3Ccircle cx='28' cy='40' r='8' fill='none' stroke='%23333' stroke-width='2.5'/%3E%3Cline x1='38' y1='50' x2='44' y2='56' stroke='%23333' stroke-width='2.5'/%3E%3Ccircle cx='47' cy='35' r='6' fill='none' stroke='%23333' stroke-width='2.5'/%3E%3Cline x1='52' y1='40' x2='56' y2='44' stroke='%23333' stroke-width='2.5'/%3E%3C/svg%3E">
    <style>
        :root {
            --bg: #1e1e1e;
            --sidebar-bg: #171717;
            --editor-bg: #252525;
            --text: #d4d4d4;
            --border: #333;
            --accent: #60a5fa;
            --danger: #ef4444;
            --safe-top: env(safe-area-inset-top, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh; height: 100dvh;
            display: flex;
            overflow: hidden;
            padding-top: var(--safe-top);
        }
        .sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            position: fixed; top:0; left:0; bottom:0;
            z-index: 30; transition: transform 0.3s;
            padding-top: calc(24px + var(--safe-top));
        }
        .sidebar.collapsed { transform: translateX(-260px); }
        .sidebar-header {
            padding: 12px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-header h2 { font-size:1rem; display:flex; align-items:center; gap:8px; }
        .notes-list { flex:1; overflow-y:auto; padding:8px; }
        .note-item {
            padding: 10px; border-radius: 6px; cursor: pointer;
            display: flex; justify-content: space-between; margin-bottom: 4px;
        }
        .note-item.active { background: #1e3a5f; }
        .main-panel {
            flex:1; display:flex; flex-direction: column;
            margin-left: 0; padding-top: 24px;
        }
        .toolbar {
            display:flex; gap:4px; padding: 8px 8px;
            background: var(--sidebar-bg); border-bottom:1px solid var(--border);
            align-items: center;
            flex-wrap: wrap;
            min-height: 44px;
        }
        .btn {
            background: #2d2d2d; border:1px solid var(--border);
            color: var(--text); padding: 6px 8px; border-radius: 6px;
            cursor: pointer; font-size:0.8rem;
            white-space: nowrap;
        }
        textarea.editor {
            flex:1; background: var(--editor-bg); color: var(--text);
            border:none; padding:16px; font-family: monospace;
            font-size:15px; resize:none; outline:none;
            word-break: break-word;
            overflow-wrap: anywhere;
            white-space: pre-wrap;
            width: 100%;
        }
        .float-btn { display: none; }
        .dropdown-menu {
            display:none; position:absolute; background:#2d2d2d;
            border:1px solid var(--border); border-radius:6px; margin-top:4px;
            z-index:50; right:0;
        }
        .dropdown-menu button {
            display:block; width:100%; text-align:left;
        }
    </style>
</head>
<body>
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h2>📝 Blocasi82</h2>
            <button class="btn" onclick="toggleSidebar()">×</button>
        </div>
        <button class="btn" onclick="newNote()" style="margin:8px; background:var(--accent); color:#000;">＋ Nueva nota</button>
        <div class="notes-list" id="notesList"></div>
    </aside>
    <div class="main-panel">
        <div class="toolbar">
            <button class="btn" onclick="toggleSidebar()">☰</button>
            <span id="noteInfo" style="flex:1; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis;"></span>
            <button class="btn" onclick="document.getElementById('fileInput').click()">📂</button>
            <div style="position:relative;">
                <button class="btn" onclick="toggleMenu('moreMenu')">⋮</button>
                <div id="moreMenu" class="dropdown-menu">
                    <button class="btn" onclick="shareNote()">📤 Compartir</button>
                    <button class="btn" onclick="deleteCurrentNote()" style="color:var(--danger);">🗑️ Eliminar</button>
                </div>
            </div>
        </div>
        <textarea class="editor" id="editor" placeholder="Escribe aquí… sin límites."></textarea>
    </div>
    <input type="file" id="fileInput" accept=".txt,.html,.csv" style="display:none" onchange="openFile(event)">

    <script>
        const DB = 'Blocasi82DB';
        let db, currentNoteId = null, saveTimeout;
        const editor = document.getElementById('editor');
        const noteInfo = document.getElementById('noteInfo');

        function openDB() {
            return new Promise((res, rej) => {
                const r = indexedDB.open(DB, 1);
                r.onupgradeneeded = e => {
                    const s = e.target.result.createObjectStore('notas', { keyPath: 'id' });
                    s.createIndex('updatedAt', 'updatedAt', { unique: false });
                };
                r.onsuccess = e => { db = e.target.result; res(); };
                r.onerror = rej;
            });
        }
        function tx(m) { return db.transaction(['notas'], m).objectStore('notas'); }
        async function getAllNotes() {
            const notes = await new Promise(r => { const req = tx('readonly').getAll(); req.onsuccess = () => r(req.result); });
            return notes.sort((a,b) => b.updatedAt - a.updatedAt);
        }
        function getNote(id) { return new Promise(r => { const req = tx('readonly').get(id); req.onsuccess = () => r(req.result); }); }
        function saveNoteToDB(note) { return new Promise(r => { const req = tx('readwrite').put(note); req.onsuccess = () => r(); }); }
        function deleteNoteFromDB(id) { return new Promise(r => { const req = tx('readwrite').delete(id); req.onsuccess = () => r(); }); }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
        }

        function toggleMenu(id) {
            const menu = document.getElementById(id);
            const isVisible = menu.style.display === 'block';
            closeAllMenus();
            menu.style.display = isVisible ? 'none' : 'block';
        }

        function closeAllMenus() {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
        }

        async function renderList() {
            const notes = await getAllNotes();
            const list = document.getElementById('notesList');
            list.innerHTML = notes.length ? '' : '<div style="padding:16px;color:#666">Sin notas</div>';
            notes.forEach(n => {
                const d = document.createElement('div');
                d.className = 'note-item' + (n.id === currentNoteId ? ' active' : '');
                d.innerHTML = `<span style="overflow:hidden;text-overflow:ellipsis;">${n.title||'Sin título'}</span>
                    <div>
                        <button class="btn" onclick="event.stopPropagation(); renameNote('${n.id}')">✏️</button>
                        <button class="btn" onclick="event.stopPropagation(); deleteNoteById('${n.id}')" style="color:var(--danger)">🗑️</button>
                    </div>`;
                d.onclick = () => loadNote(n.id);
                list.appendChild(d);
            });
        }
        async function renameNote(id) {
            const note = await getNote(id);
            const newTitle = prompt('Nuevo nombre:', note.title);
            if (newTitle && newTitle.trim()) {
                note.title = newTitle.trim();
                note.updatedAt = Date.now();
                await saveNoteToDB(note);
                if (id === currentNoteId) noteInfo.textContent = note.title;
                renderList();
            }
        }
        async function loadNote(id) {
            if (currentNoteId) {
                const n = await getNote(currentNoteId);
                if (n) { n.content = editor.value; n.updatedAt = Date.now(); await saveNoteToDB(n); }
            }
            const note = await getNote(id);
            if (!note) return;
            currentNoteId = id;
            editor.value = note.content || '';
            noteInfo.textContent = note.title || '';
            editor.style.whiteSpace = 'pre-wrap';
            renderList();
            if (window.innerWidth < 600) toggleSidebar();
        }
        async function newNote() {
            if (currentNoteId) {
                const n = await getNote(currentNoteId);
                if (n) { n.content = editor.value; n.updatedAt = Date.now(); await saveNoteToDB(n); }
            }
            const note = { id: 'n'+Date.now(), title: 'Sin título', content: '', updatedAt: Date.now() };
            await saveNoteToDB(note);
            await loadNote(note.id);
            editor.focus();
        }
        async function deleteCurrentNote() {
            if (!currentNoteId) return;
            if (!confirm('¿Eliminar esta nota?')) return;
            await deleteNoteFromDB(currentNoteId);
            currentNoteId = null;
            editor.value = '';
            noteInfo.textContent = '';
            renderList();
            closeAllMenus();
        }
        async function deleteNoteById(id) {
            if (!confirm('¿Eliminar esta nota?')) return;
            await deleteNoteFromDB(id);
            if (currentNoteId === id) {
                currentNoteId = null;
                editor.value = '';
                noteInfo.textContent = '';
            }
            renderList();
        }
        editor.addEventListener('input', () => {
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(async () => {
                if (!currentNoteId) return;
                const n = await getNote(currentNoteId);
                if (n) {
                    n.content = editor.value;
                    n.updatedAt = Date.now();
                    const first = n.content.split('\n')[0].trim();
                    if (first && n.title === 'Sin título') n.title = first.substring(0,50);
                    await saveNoteToDB(n);
                    noteInfo.textContent = n.title;
                    renderList();
                }
            }, 500);
        });

        function openFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                const note = { id: 'n'+Date.now(), title: file.name, content: e.target.result, updatedAt: Date.now() };
                await saveNoteToDB(note);
                await loadNote(note.id);
                editor.style.whiteSpace = 'pre-wrap';
                renderList();
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ✅ Compartir como archivo .txt (cordova-plugin-x-socialsharing)
        async function shareNote() {
            if (!currentNoteId) return;
            const content = editor.value;
            const title = noteInfo.textContent || 'Nota';
            const filename = (noteInfo.textContent || 'nota').replace(/[^a-z0-9]/gi,'_') + '.txt';

            if (window.plugins && window.plugins.socialsharing) {
                // Guardar archivo temporal y compartirlo
                const tempPath = cordova.file.cacheDirectory + filename;
                window.resolveLocalFileSystemURL(cordova.file.cacheDirectory, function(dirEntry) {
                    dirEntry.getFile(filename, { create: true, exclusive: false }, function(fileEntry) {
                        fileEntry.createWriter(function(fileWriter) {
                            fileWriter.onwriteend = function() {
                                // Compartir el archivo
                                window.plugins.socialsharing.shareWithOptions({
                                    files: [fileEntry.nativeURL],
                                    subject: title
                                }, function(result) {
                                    // éxito
                                }, function(err) {
                                    alert('Error al compartir: ' + err);
                                });
                            };
                            fileWriter.onerror = function(e) {
                                alert('Error al crear archivo temporal: ' + e.toString());
                            };
                            fileWriter.write(new Blob([content], {type: 'text/plain'}));
                        });
                    }, function(err) {
                        alert('Error al crear archivo en caché: ' + err.code);
                    });
                });
            } else if (navigator.share) {
                try {
                    await navigator.share({ title: title, text: content });
                } catch (e) { /* cancelado */ }
            } else {
                alert('Compartir no soportado. Copia el texto manualmente.');
            }
            closeAllMenus();
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.dropdown-menu') && !e.target.closest('button[onclick*="toggleMenu"]')) {
                closeAllMenus();
            }
        });

        window.loadExternalContent = async function(title, content) {
            const note = {
                id: 'n'+Date.now(),
                title: title || 'Archivo externo',
                content: content || '',
                updatedAt: Date.now()
            };
            await saveNoteToDB(note);
            await loadNote(note.id);
            editor.style.whiteSpace = 'pre-wrap';
            renderList();
        };

        (async () => {
            await openDB();
            const notes = await getAllNotes();
            if (notes.length) await loadNote(notes[0].id);
            else renderList();
        })();
    </script>
</body>
</html>
